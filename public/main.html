<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fana AI Bot - Pairing Interface</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        h1 { color: #333; margin-bottom: 20px; }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px;
            transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            margin: 10px 0;
            font-size: 16px;
        }
        #qrcode { margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Fana AI Bot</h1>
        <p>Connect your WhatsApp to get started</p>
        
        <div id="status"></div>
        
        <button class="btn" onclick="generateQR()">📱 Generate QR Code</button>
        
        <div style="margin: 20px 0;">
            <input type="tel" id="phoneNumber" placeholder="+1234567890" maxlength="15">
            <button class="btn" onclick="generateCode()">🔑 Generate Pairing Code</button>
        </div>
        
        <div id="qrcode"></div>
        <div id="pairingCode" style="font-size: 24px; font-weight: bold; margin: 20px 0;"></div>
        
        <div style="margin-top: 30px; font-size: 14px; color: #666;">
            <p>© 2024 Fana AI Bot - Powered by AI</p>
            <p>🌐 Live at: <a href="https://fana-aibot-1.onrender.com" target="_blank">fana-aibot-1.onrender.com</a></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script>
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = `<div class="status ${type}">${message}</div>`;
        }

        async function generateQR() {
            try {
                showStatus('🔄 Generating QR Code...', 'info');
                
                const response = await fetch('/api/generate-qr', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    const qrElement = document.getElementById('qrcode');
                    qrElement.innerHTML = '';
                    
                    QRCode.toCanvas(qrElement, data.qr, {
                        width: 256,
                        margin: 2
                    });
                    
                    showStatus('✅ QR Code generated! Scan with WhatsApp', 'success');
                    checkConnection();
                } else {
                    showStatus('❌ Failed to generate QR Code: ' + data.error, 'error');
                }
            } catch (error) {
                showStatus('❌ Error: ' + error.message, 'error');
            }
        }

        async function generateCode() {
            const phoneNumber = document.getElementById('phoneNumber').value.trim();
            
            if (!phoneNumber) {
                showStatus('❌ Please enter your phone number', 'error');
                return;
            }
            
            try {
                showStatus('🔄 Generating Pairing Code...', 'info');
                
                const response = await fetch('/api/generate-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phoneNumber })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('pairingCode').textContent = data.formattedCode;
                    showStatus('✅ Pairing code generated! Enter it in WhatsApp', 'success');
                    checkConnection();
                } else {
                    showStatus('❌ Failed to generate code: ' + data.error, 'error');
                }
            } catch (error) {
                showStatus('❌ Error: ' + error.message, 'error');
            }
        }

        async function checkConnection() {
            const interval = setInterval(async () => {
                try {
                    const response = await fetch('/api/connection-status');
                    const data = await response.json();
                    
                    if (data.connected) {
                        clearInterval(interval);
                        showStatus('🎉 Successfully connected to WhatsApp!', 'success');
                        document.querySelector('.container').innerHTML += `
                            <div class="status success" style="margin-top: 20px;">
                                ✅ Bot is now online and ready to use!<br>
                                📱 Phone: ${data.phoneNumber || 'Connected'}<br>
                                🤖 Send a message to test the bot
                            </div>
                        `;
                    }
                } catch (error) {
                    console.error('Connection check failed:', error);
                }
            }, 3000);
            
            // Stop checking after 10 minutes
            setTimeout(() => clearInterval(interval), 600000);
        }

        // Auto-focus phone input
        document.getElementById('phoneNumber').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 0 && !value.startsWith('+')) {
                value = '+' + value;
            }
            e.target.value = value;
        });

        // Enter key support
        document.getElementById('phoneNumber').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                generateCode();
            }
        });

        // Show initial status
        showStatus('🤖 Ready to connect! Choose QR Code or Phone Number method above.', 'info');
    </script>
</body>
</html>
